name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify build artifacts exist
        run: test -f build/bin/server.js

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx --test tests/unit/**/*.test.ts

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx --test --test-force-exit tests/integration/**/*.test.ts

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t muvis:ci .
      - name: Run container smoke test
        run: |
          docker run -d \
            --name m8-smoke \
            -p 8787:8787 \
            -e JWT_SECRET=ci-jwt-secret-min-32-characters-long \
            -e APP_KEY=ci-app-key-exactly-16 \
            -e COOKIE_SECRET=ci-cookie-secret-16 \
            -e NODE_ENV=production \
            -e DATABASE_AUTOMIGRATE=true \
            -e SECURITY_HEADERS_ENABLED=true \
            -e RATE_LIMIT_ENABLED=true \
            muvis:ci
          sleep 8
          curl -sf http://localhost:8787/v1/health || (docker logs m8-smoke && exit 1)
          docker stop m8-smoke
          docker rm m8-smoke
